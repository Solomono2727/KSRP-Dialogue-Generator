<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KSRP Dialogue Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>KSRP Dialogue Generator</h1>

    <!-- USER INFO -->
    <div class="card">
      <h3>Moderator Info</h3>
      <div class="row">
        <input id="name" placeholder="Enter your name" />

        <div class="select-wrapper">
          <select id="rank">
            <option>🏛 Foundation</option>
            <option>👑 Board of Directors</option>
            <option>📊 Management</option>
            <option>🕵️ Internal Affairs</option>
            <option>⚙️ Administration</option>
            <option selected>🛡 Moderation</option>
          </select>
        </div>
      </div>
    </div>

    <!-- MAIN DIALOGUES -->
    <div class="card">
      <h3>Dialogue Generator</h3>
      <div id="dialogues"></div>
    </div>

    <!-- H & M -->
    <div class="card">
      <h3>H's and M Messages</h3>
      <div id="hm-messages"></div>
    </div>

    <!-- FAVORITES -->
    <div class="card">
      <h3>⭐ Favorites</h3>
      <div id="favorites"></div>
    </div>
  </div>

  <div id="toast" class="toast">Copied!</div>

  <script src="script.js"></script>
</body>
</html>
